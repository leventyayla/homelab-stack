services:
  homarr:
    image: ghcr.io/ajnart/homarr:0.15.3
    container_name: homarr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - homarr-config:/app/data/configs
      - homarr-icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY:-changeme-32-chars-encryption-key}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.homarr.rule=Host(`dashboard.${DOMAIN}`)"
      - traefik.http.routers.homarr.entrypoints=websecure
      - traefik.http.routers.homarr.tls=true
      - traefik.http.services.homarr.loadbalancer.server.port=7575
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:7575/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  homepage:
    image: ghcr.io/gethomepage/homepage:v0.9.10
    container_name: homepage
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.homepage.rule=Host(`home.${DOMAIN}`)"
      - traefik.http.routers.homepage.entrypoints=websecure
      - traefik.http.routers.homepage.tls=true
      - traefik.http.services.homepage.loadbalancer.server.port=3000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true

volumes:
  homarr-config:
  homarr-icons:
  homepage-config:
