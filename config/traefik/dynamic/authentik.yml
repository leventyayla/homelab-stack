# =============================================================================
# Traefik — Authentik ForwardAuth Middleware
#
# Protects any service routed through Traefik.
# Unauthenticated requests are redirected to https://auth.DOMAIN for login.
#
# Usage — add to any service's docker-compose labels:
#   traefik.http.routers.<name>.middlewares=authentik@file
#
# Docs: https://docs.goauthentik.io/docs/providers/proxy/traefik
# =============================================================================

http:
  middlewares:
    # Full SSO protection — redirects to Authentik login page
    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

    # Lightweight check — 401 for unauthenticated (no redirect)
    # Use this for APIs that need auth but not browser redirect
    authentik-basic:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
